[project]
site_name = "ob-analytics"
site_description = "Limit order book analytics and visualization for Python"
repo_url = "https://github.com/mczielinski/ob-analytics"
repo_name = "mczielinski/ob-analytics"

nav = [
  { "Home" = "index.md" },
  { "Quickstart" = "quickstart.md" },
  { "API Reference" = [
    { "Pipeline" = "api/pipeline.md" },
    { "Configuration" = "api/config.md" },
    { "Protocols" = "api/protocols.md" },
    { "Domain Models" = "api/models.md" },
    { "Bitstamp" = "api/bitstamp.md" },
    { "LOBSTER" = "api/lobster.md" },
    { "Analytics" = "api/analytics.md" },
    { "Matching Engine" = "api/matching_engine.md" },
    { "Flow Toxicity" = "api/flow_toxicity.md" },
    { "Depth Metrics" = "api/depth.md" },
    { "Order Book" = "api/order_book.md" },
    { "Order Types" = "api/order_types.md" },
    { "Data I/O" = "api/data.md" },
    { "Visualization" = "api/visualisation.md" },
    { "Exceptions" = "api/exceptions.md" },
    { "CLI" = "api/cli.md" },
  ] },
  { "Changelog" = "changelog.md" },
]

[project.theme]
features = ["navigation.sections", "navigation.expand", "content.code.copy", "toc.follow"]

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "pink"
toggle = { icon = "material/brightness-7", name = "Switch to light mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "pink"
toggle = { icon = "material/brightness-4", name = "Switch to dark mode" }

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false
show_root_heading = true
show_root_full_path = false
heading_level = 3
members_order = "source"
show_signature_annotations = true
separate_signature = true
docstring_style = "numpy"
merge_init_into_class = true
show_if_no_docstring = false
