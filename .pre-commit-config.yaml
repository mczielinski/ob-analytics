# Pre-commit configuration for ob-analytics.
#
# Mirrors the CI lint + typecheck jobs (.github/workflows/ci.yml) so that
# violations are caught locally before pushing. Runs tools via `uv run` to
# pin to the exact versions resolved in uv.lock.
#
# Setup:
#   uv sync --group dev --extra interactive --extra live
#   uv run pre-commit install
#
# Hook entries pass --frozen so an out-of-date uv.lock can never be rewritten
# mid-hook (which would dirty the tree and fail the run), and pass the same
# groups/extras as CI so `uv run`'s implicit sync doesn't uninstall the extras
# (see the ty comment in .github/workflows/ci.yml).

exclude: ^ob_analytics/_sample_data/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --frozen --group dev --extra interactive --extra live ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run --frozen --group dev --extra interactive --extra live ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty check
        entry: uv run --frozen --group dev --extra interactive --extra live ty check ob_analytics/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
