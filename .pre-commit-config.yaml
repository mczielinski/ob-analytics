# Pre-commit configuration for ob-analytics.
#
# Mirrors the CI lint + typecheck jobs (.github/workflows/ci.yml) so that
# violations are caught locally before pushing. Runs tools via `uv run` to
# pin to the exact versions resolved in uv.lock.
#
# Setup:
#   uv sync --group dev --extra interactive
#   uv run pre-commit install

exclude: ^ob_analytics/_sample_data/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty check
        entry: uv run ty check ob_analytics/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
