# Dependabot configuration.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Updates are grouped per ecosystem so we get at most one PR per ecosystem
# per cycle instead of one PR per dependency.

version: 2

updates:
  # GitHub Actions referenced from .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"

  # Python dependencies managed by uv (pyproject.toml + uv.lock).
  # Because pyproject.toml pins use loose ranges (>=, <), Dependabot will
  # typically only modify uv.lock unless a new release breaks the range.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-prod:
        dependency-type: "production"
        patterns: ["*"]
      python-dev:
        dependency-type: "development"
        patterns: ["*"]
    commit-message:
      prefix: "deps"
      include: "scope"
