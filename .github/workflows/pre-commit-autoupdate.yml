name: Pre-commit autoupdate

# Bumps `rev:` pins in .pre-commit-config.yaml to the latest hook releases
# every Monday and opens a PR if anything changed. Dependabot doesn't have
# a native pre-commit ecosystem, so we DIY it with `pre-commit autoupdate`.
#
# Note: PRs opened by GITHUB_TOKEN do NOT trigger other workflows (so CI
# won't auto-run on the PR). Either close/reopen the PR to kick CI, or
# replace `${{ secrets.GITHUB_TOKEN }}` below with a fine-grained PAT
# stored as a repo secret.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - run: uv sync --group dev

      - name: Run pre-commit autoupdate
        run: uv run pre-commit autoupdate

      - name: Open PR if hooks changed
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(pre-commit): autoupdate hooks"
          title: "chore(pre-commit): autoupdate hooks"
          body: |
            Automated bump of `rev:` pins in `.pre-commit-config.yaml`,
            generated by `.github/workflows/pre-commit-autoupdate.yml`
            via `uv run pre-commit autoupdate`.

            CI may not run automatically on this PR (PRs opened by
            `GITHUB_TOKEN` do not trigger workflows). Close and reopen
            the PR to kick CI, or run hooks locally to verify.
          branch: chore/pre-commit-autoupdate
          delete-branch: true
          labels: |
            dependencies
            automated
