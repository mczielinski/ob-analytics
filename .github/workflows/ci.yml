name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check ob_analytics/ tests/
      - run: uv run ruff format --check ob_analytics/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group dev --extra interactive --extra live
      # Pass --extra to `uv run` too: its implicit sync would otherwise
      # re-resolve to the project default (no extras) and uninstall plotly /
      # websockets, leaving imports in visualization/ and live/ unresolvable.
      - run: uv run --group dev --extra interactive --extra live ty check ob_analytics/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --extra interactive --extra live --python ${{ matrix.python-version }}
      # Pass --extra to `uv run` too: its implicit sync would otherwise
      # re-resolve to the project default (no extras) and uninstall plotly /
      # websockets, which causes test_plotly_backend.py to skip and any
      # test_live_protocol tests that import bitstamp capturer to break.
      - run: uv run --group dev --extra interactive --extra live --python ${{ matrix.python-version }} pytest tests/ --cov=ob_analytics --cov-report=xml -q --durations=15
      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.event_name == 'push'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # macOS smoke: one Python, no coverage — catches platform-specific breakage
  # (paths, matplotlib backend, wheels) that the ubuntu matrix can't.
  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --group dev --extra interactive --extra live --python 3.12
      - run: uv run --group dev --extra interactive --extra live --python 3.12 pytest tests/ -q

  # Execute the tutorial notebooks as living integration tests of the public
  # API. Kept off the test matrix (own job) so notebook latency doesn't 3x.
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group dev --extra interactive
      - run: uv run --group dev --extra interactive pytest --nbmake docs/notebooks/ --nbmake-timeout=180 -q
