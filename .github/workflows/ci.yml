name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check ob_analytics/ tests/
      - run: uv run ruff format --check ob_analytics/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --group dev --extra interactive
      # Pass --extra to `uv run` too: its implicit sync would otherwise
      # re-resolve to the project default (no extras) and uninstall plotly,
      # making `import plotly` unresolvable in ob_analytics/visualization/.
      - run: uv run --group dev --extra interactive ty check ob_analytics/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --extra interactive --python ${{ matrix.python-version }}
      # Pass --extra to `uv run` too: its implicit sync would otherwise
      # re-resolve to the project default (no extras) and uninstall plotly,
      # which causes test_plotly_backend.py to skip and the gallery
      # default-backends test to fail because `import plotly` raises.
      - run: uv run --group dev --extra interactive --python ${{ matrix.python-version }} pytest tests/ --cov=ob_analytics --cov-report=xml -q
      - name: Upload coverage
        if: matrix.python-version == '3.11' && github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
